    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ruluko&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      @import url('https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap');
      
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { background: #02030a; color: #e2e8f0; overflow-x: hidden; }
      
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #02030a; }
      ::-webkit-scrollbar-thumb { background: #00ff87; border-radius: 2px; }
      
      ::selection { background: rgba(0,255,135,0.3); color: #fff; }
    </style>
